
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World Food Tour Roleplay</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,sans-serif;background:#f8f9fa;}
    .wrap{max-width:700px;margin:0 auto;padding:1rem;}
    h1{font-size:22px;font-weight:500;text-align:center;margin:1rem 0;}
    h2{font-size:18px;font-weight:500;text-align:center;margin-bottom:1rem;}

    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
    @media(min-width:500px){.grid{grid-template-columns:repeat(4,1fr);}}
    .card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem;cursor:pointer;text-align:center;font-size:1rem;font-weight:500;transition:background 0.15s;}
    .card:hover{background:#f0f0f0;}

    .script-line{margin-bottom:12px;padding:12px;border-left:4px solid #4A90E2;background:#fff;border-radius:0 12px 12px 0;cursor:pointer;transition:background 0.15s, border-left-color 0.15s;}
    .script-line:hover{background:#f5f5f5;}
    .script-line.active{background:#ffec99;border-left-color:#fab005;}
    .script-line.speaking{background:#e8f4e8;border-left-color:#28a745;}

    .role-tag{display:inline-block;font-size:11px;font-weight:500;color:#fff;background:#333;padding:2px 7px;border-radius:5px;margin-right:8px;}
    .en-text{display:block;font-size:1.15rem;font-weight:500;line-height:1.5;margin:6px 0 3px;}
    .kr-text{display:block;font-size:0.9rem;color:#888;}
    .act-text{display:block;font-size:0.8rem;color:#4A90E2;font-style:italic;margin-top:3px;}

    .tts-hint{font-size:12px;color:#aaa;text-align:center;margin-bottom:12px;}
    .tts-hint span{background:#e8f4e8;color:#28a745;border-radius:5px;padding:2px 8px;font-size:11px;}

    .btn-row{display:flex;gap:10px;justify-content:center;margin-top:1rem;}
    button{padding:10px 22px;border:1px solid #ccc;border-radius:10px;cursor:pointer;font-size:1rem;font-weight:500;background:#fff;}

    .tts-status{text-align:center;font-size:12px;color:#28a745;margin-top:8px;height:16px;}

    .hidden{display:none!important;}
  </style>
</head>
<body>
<div class="wrap">
  <div id="step1">
    <h1>🌍 세계 식당 투어</h1>
    <div class="grid" id="menu-grid"></div>
  </div>

  <div id="step2" class="hidden">
    <h2 id="country-title"></h2>
    <p class="tts-hint">대사를 클릭하면 <span>🔊 영어 발음</span>이 재생됩니다</p>
    <div id="editor-area"></div>
    <div class="tts-status" id="tts-status"></div>
    <div class="btn-row">
      <button onclick="resetAll()">← 처음으로</button>
    </div>
  </div>
</div>

<script>
const data = {
  "Italy":   { title:"🇮🇹 Italy",
    script:[
      {role:"Owner",     en:"Welcome to our Italian restaurant!", kr:"저희 이탈리아 식당에 오신 것을 환영합니다!", action:"(팔 벌려 환영하기)"},
      {role:"Server",    en:"Where are you from?",                kr:"어디에서 오셨나요?",                        action:"(메뉴판 건네기)"},
      {role:"Traveler 1",en:"I'm from Korea.",                    kr:"저는 한국에서 왔어요.",                     action:"(웃으며 대답)"},
      {role:"Traveler 2",en:"Do you want some pizza?",            kr:"피자 좀 먹어볼래?",                         action:"(메뉴 가리키기)"},
      {role:"Traveler 1",en:"Yes, please!",                       kr:"네, 주세요!",                               action:"(맛있게 먹는 흉내)"}
    ]},
  "USA":     { title:"🇺🇸 USA",
    script:[
      {role:"Owner",     en:"Welcome to the Big Apple Burger!", kr:"빅 애플 버거에 오신 걸 환영해요!", action:""},
      {role:"Server",    en:"Where are you from?",              kr:"어느 나라에서 오셨나요?",          action:""},
      {role:"Traveler 1",en:"I'm from France.",                 kr:"프랑스에서 왔어요.",               action:""},
      {role:"Traveler 2",en:"Do you want a hot dog?",           kr:"핫도그 먹어볼래?",                 action:""},
      {role:"Traveler 1",en:"Oh, I'm so full!",                 kr:"오, 배가 너무 불러요!",            action:""}
    ]},
  "India":   { title:"🇮🇳 India",
    script:[
      {role:"Owner",     en:"Namaste! Welcome to India!",       kr:"나마스테! 인도에 오신 걸 환영합니다!", action:""},
      {role:"Server",    en:"Where are you from?",              kr:"어디서 오셨나요?",                   action:""},
      {role:"Traveler 1",en:"I'm from the UK.",                 kr:"영국에서 왔어요.",                   action:""},
      {role:"Traveler 2",en:"Do you want some curry?",          kr:"카레 좀 드셔보실래요?",             action:""},
      {role:"Traveler 1",en:"Yes please. Best curry ever!",     kr:"네! 인생 최고의 카레네요.",         action:"(엄지 척)"}
    ]},
  "Japan":   { title:"🇯🇵 Japan",
    script:[
      {role:"Owner",     en:"Welcome to Tokyo Station!",        kr:"도쿄 스테이션에 오신 걸 환영합니다!", action:""},
      {role:"Server",    en:"Where are you from?",              kr:"어느 나라에서 오셨나요?",            action:""},
      {role:"Traveler 1",en:"I'm from Korea.",                  kr:"한국에서 왔어요.",                  action:""},
      {role:"Traveler 2",en:"Do you want some sushi?",          kr:"초밥 좀 먹어볼래?",                 action:""},
      {role:"Traveler 1",en:"No, thank you. Ramen please!",     kr:"아니요, 괜찮아요. 라멘 부탁해요!", action:""}
    ]},
  "China":   { title:"🇨🇳 China",
    script:[
      {role:"Owner",     en:"Welcome to Golden Dragon!",        kr:"골든 드래곤에 오신 걸 환영합니다!", action:""},
      {role:"Server",    en:"Where are you from?",              kr:"어느 나라에서 오셨나요?",           action:""},
      {role:"Traveler 1",en:"I'm from Mexico.",                 kr:"멕시코에서 왔어요.",                action:""},
      {role:"Traveler 2",en:"Do you want some dim sum?",        kr:"딤섬 좀 먹어볼래?",                action:""},
      {role:"Traveler 1",en:"It's so hot!",                     kr:"너무 뜨거워!",                     action:"(입 호호 부는 흉내)"}
    ]},
  "Vietnam": { title:"🇻🇳 Vietnam",
    script:[
      {role:"Owner",     en:"Welcome to Mekong River Restaurant!", kr:"메콩 강 식당에 오신 걸 환영합니다!", action:""},
      {role:"Server",    en:"Where are you from?",                 kr:"어느 나라에서 오셨나요?",           action:""},
      {role:"Traveler 1",en:"I'm from Spain.",                     kr:"스페인에서 왔어.",                  action:""},
      {role:"Traveler 2",en:"Do you want some Pho?",               kr:"쌀국수 좀 먹어볼래?",              action:""},
      {role:"Traveler 1",en:"I like it!",                          kr:"나 이거 정말 좋아!",                action:"(엄지 척)"}
    ]},
  "Thailand":{ title:"🇹🇭 Thailand",
    script:[
      {role:"Owner",     en:"Welcome to Amazing Thailand!",     kr:"어메이징 태국에 오신 걸 환영합니다!", action:""},
      {role:"Server",    en:"Where are you from?",              kr:"어디에서 오셨나요?",                action:""},
      {role:"Traveler 1",en:"I'm from Canada.",                 kr:"캐나다에서 왔어요.",                action:""},
      {role:"Traveler 2",en:"Do you want some Tom Yum?",        kr:"똠양꿍 좀 먹어볼래?",              action:""},
      {role:"Traveler 1",en:"It's sour and spicy!",             kr:"이건 시고 매워!",                  action:"(찡그리는 표정)"}
    ]},
  "France":  { title:"🇫🇷 France",
    script:[
      {role:"Owner",     en:"Welcome to Fancy Paris!",          kr:"근사한 파리에 오신 걸 환영합니다!", action:""},
      {role:"Server",    en:"Where are you from?",              kr:"어느 나라에서 오셨나요?",           action:""},
      {role:"Traveler 1",en:"I'm from Australia.",              kr:"호주에서 왔어요.",                 action:""},
      {role:"Traveler 2",en:"Do you want some snails?",         kr:"달팽이 요리 좀 먹어볼래?",         action:""},
      {role:"Traveler 1",en:"Oh, I'm so surprised!",            kr:"오, 정말 놀라워요!",               action:"(깜짝 놀라는 표정)"}
    ]}
};

let currentKey = "";
let currentSpeaking = null;

// TTS 지원 여부 확인
const ttsSupported = 'speechSynthesis' in window;

function speak(text, lineEl) {
  if (!ttsSupported) {
    document.getElementById('tts-status').textContent = '이 브라우저는 음성 재생을 지원하지 않습니다.';
    return;
  }

  // 이미 같은 줄 재생 중이면 멈추기
  if (currentSpeaking === lineEl) {
    window.speechSynthesis.cancel();
    lineEl.classList.remove('speaking');
    currentSpeaking = null;
    document.getElementById('tts-status').textContent = '';
    return;
  }

  window.speechSynthesis.cancel();
  if (currentSpeaking) currentSpeaking.classList.remove('speaking');

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1;

  currentSpeaking = lineEl;
  lineEl.classList.add('speaking');
  document.getElementById('tts-status').textContent = '🔊 재생 중... (다시 클릭하면 정지)';

  utter.onend = () => {
    lineEl.classList.remove('speaking');
    currentSpeaking = null;
    document.getElementById('tts-status').textContent = '';
  };
  utter.onerror = () => {
    lineEl.classList.remove('speaking');
    currentSpeaking = null;
    document.getElementById('tts-status').textContent = '';
  };

  window.speechSynthesis.speak(utter);
}

const menuGrid = document.getElementById('menu-grid');
Object.keys(data).forEach(key => {
  const c = document.createElement('div');
  c.className = 'card';
  c.innerText = data[key].title;
  c.onclick = () => loadEditor(key);
  menuGrid.appendChild(c);
});

function loadEditor(key) {
  currentKey = key;
  window.speechSynthesis && window.speechSynthesis.cancel();
  currentSpeaking = null;
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('country-title').innerText = data[key].title;
  document.getElementById('tts-status').textContent = '';

  const area = document.getElementById('editor-area');
  area.innerHTML = "";
  data[key].script.forEach(item => {
    const div = document.createElement('div');
    div.className = 'script-line';
    div.onclick = () => {
      div.classList.toggle('active');
      speak(item.en, div);
    };
    div.innerHTML = `
      <span class="role-tag">${item.role}</span>
      <span class="en-text">🔊 ${item.en}</span>
      <span class="kr-text">${item.kr}</span>
      ${item.action ? `<span class="act-text">${item.action}</span>` : ''}`;
    area.appendChild(div);
  });
}

function resetAll() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  currentSpeaking = null;
  location.reload();
}
</script>
</body>
</html>
